<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Travel Data Analyzer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["pandas", "plotly"], // Libraries needed
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st
import pandas as pd
import plotly.express as px

st.title("🌍 Travel Record Analyzer")
st.write("Upload your Excel or CSV travel logs to see your stats!")

uploaded_file = st.file_uploader("Choose a file", type=['csv', 'xlsx'])

if uploaded_file is not None:
    # Load data
    if uploaded_file.name.endswith('.csv'):
        df = pd.read_csv(uploaded_file)
    else:
        df = pd.read_excel(uploaded_file)

    st.subheader("Raw Data Preview")
    st.dataframe(df.head())

    st.subheader("Data Visualization")
    
    # Filter columns that are good for Pie Charts (Categorical)
    # We usually want columns with a manageable number of unique values
    pie_columns = [col for col in df.columns if df[col].nunique() < 20]
    
    if pie_columns:
        target_col = st.selectbox("Select a category to visualize as a Pie Chart:", pie_columns)
        
        # Create the Pie Chart
        # count() is used to show the distribution of entries
        fig = px.pie(df, names=target_col, title=f"Distribution of {target_col}", hole=0.3)
        
        # Improve layout
        fig.update_traces(textposition='inside', textinfo='percent+label')
        
        st.plotly_chart(fig)
    else:
        st.warning("No suitable categorical columns found for a pie chart.")
`
        }
      }, document.getElementById("root"));
    </script>
  </body>
</html>
